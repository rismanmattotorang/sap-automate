name: release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write

jobs:
  # Build release binaries for Linux x86_64 + ARM64.
  binaries:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: Build server
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} \
              --bin sap-automate-server --bin sap-automate-gw \
              --features sap-automate-adt/http
          else
            cargo build --release --target ${{ matrix.target }} \
              --bin sap-automate-server --bin sap-automate-gw \
              --features sap-automate-adt/http
          fi
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sap-automate-server dist/
          cp target/${{ matrix.target }}/release/sap-automate-gw     dist/
          tar -C dist -czf sap-automate-${{ github.ref_name }}-${{ matrix.target }}.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: sap-automate-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  # Build + push the container image to GHCR.
  container:
    name: Container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  # Cut a GitHub Release with the binary artifacts + container image refs.
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [binaries, container]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*.tar.gz
          generate_release_notes: true
          body: |
            ## Container images

            ```
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
            ```

            ## Quick start

            ```
            docker run --rm -p 3030:3030 ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            See [docs/ROADMAP.md](docs/ROADMAP.md) for the changelog and
            [deploy/k8s/README.md](deploy/k8s/README.md) for the
            Kubernetes deployment runbook.
