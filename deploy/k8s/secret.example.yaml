# TEMPLATE — do NOT commit a populated copy.
# Use a real secret-management workflow (External Secrets Operator,
# Sealed Secrets, HashiCorp Vault injector, etc.) in production.
#
# Create your real Secret with `kubectl create secret generic ...`
# or via your secret operator of choice.
apiVersion: v1
kind: Secret
metadata:
  name: sap-automate-secrets
  namespace: sap-automate
type: Opaque
stringData:
  # SAP credentials (resolved by sap-automate-rfc::EnvCredentialProvider).
  SAP_ASHOST: "REPLACE_ME"          # e.g. "s4hana.prod.acme.example"
  SAP_SYSNR:  "00"
  SAP_CLIENT: "100"
  SAP_USER:   "REPLACE_ME"           # technical user, not personal
  SAP_PASSWD: "REPLACE_ME"
  SAP_LANG:   "EN"

  # Optional: SAP router string for behind-firewall connections.
  # SAP_SAPROUTER: "/H/saprouter.acme.example/S/3299"

  # MCP HTTP transport bearer token (clients must pass `Authorization: Bearer …`).
  MCP_BEARER_TOKEN: "REPLACE_ME"

  # Embedding provider (when wired in P9 finalisation).
  OPENAI_API_KEY: "REPLACE_ME"
