apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sap-automate-server
  namespace: sap-automate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sap-automate-server
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # When the Prometheus adapter is installed, also scale on the
    # paper §X-D acceptance metric: P95 retrieval latency.
    # - type: Pods
    #   pods:
    #     metric:
    #       name: rag_retrieval_latency_p95_us
    #     target:
    #       type: AverageValue
    #       averageValue: 80000  # 80 ms in µs
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
